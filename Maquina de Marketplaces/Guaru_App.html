<!-- =========================================================================
     PIN MODAL — copiado exatamente do HTML original
     ========================================================================= -->
<style>
#pin-modal {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(15,10,30,0.96);
  display: flex; align-items: center; justify-content: center;
  font-family: system-ui, -apple-system, sans-serif;
}
#pin-box {
  background: #1A1030; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 40px 36px; width: 320px; max-width: 90vw;
  text-align: center;
}
#pin-logo { width: 52px; height: 52px; background: #5B3FA0; border-radius: 14px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #fff; }
#pin-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 6px; }
#pin-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
#pin-input { width: 100%; box-sizing: border-box; padding: 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff; font-size: 20px; letter-spacing: 6px; text-align: center; outline: none; margin-bottom: 16px; }
#pin-input:focus-visible { border-color: #5B3FA0; background: rgba(91,63,160,0.15); outline: 3px solid #7C5CD6; outline-offset: 2px; }
#pin-input:focus { border-color: #5B3FA0; background: rgba(91,63,160,0.15); }
#pin-btn { width: 100%; padding: 13px; background: #5B3FA0; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
#pin-btn:hover { background: #7C5CD6; }
#pin-btn:focus-visible { outline: 3px solid #B47BFF; outline-offset: 3px; }
#pin-error { font-size: 12px; color: #F05A4F; margin-top: 12px; min-height: 18px; }
#pin-reset { font-size: 11px; color: rgba(255,255,255,0.5); cursor: pointer; margin-top: 16px; display: block; background: none; border: none; }
#pin-reset:hover { color: rgba(255,255,255,0.75); }
#pin-reset:focus-visible { outline: 3px solid #B47BFF; outline-offset: 3px; border-radius: 4px; }
</style>
<script>
(async function() {
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  const stored = localStorage.getItem('guaru-pin-hash');
  const isFirst = !stored;

  const modal = document.createElement('div');
  modal.id = 'pin-modal';
  modal.setAttribute('role', 'dialog');
  modal.setAttribute('aria-modal', 'true');
  modal.setAttribute('aria-labelledby', 'pin-title');
  modal.setAttribute('aria-describedby', 'pin-subtitle');
  modal.innerHTML = `
    <div id="pin-box">
      <div id="pin-logo" aria-hidden="true">G</div>
      <h1 id="pin-title" style="font-size:18px;font-weight:600;color:#fff;margin-bottom:6px;">${isFirst ? 'Defina seu PIN' : 'Guaru App'}</h1>
      <p id="pin-subtitle">${isFirst ? 'Crie um PIN numérico para proteger seus dados' : 'Digite seu PIN para acessar'}</p>
      <input id="pin-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="••••" autofocus aria-label="${isFirst ? 'Novo PIN numérico' : 'PIN de acesso'}" aria-required="true">
      <button id="pin-btn">${isFirst ? 'Criar PIN' : 'Entrar'}</button>
      <div id="pin-error" role="alert" aria-live="assertive" aria-atomic="true"></div>
      ${!isFirst ? '<button id="pin-reset" onclick="if(confirm(\'Redefinir PIN? Você precisará criar um novo.\')) { localStorage.removeItem(\'guaru-pin-hash\'); location.reload(); }">Esqueci meu PIN</button>' : ''}
    </div>
  `;
  document.body.appendChild(modal);

  const input = document.getElementById('pin-input');
  const btn = document.getElementById('pin-btn');
  const errEl = document.getElementById('pin-error');

  /* --- Focus trap no modal PIN --- */
  function getFocusables() {
    return Array.from(modal.querySelectorAll(
      'input, button, [tabindex]:not([tabindex="-1"])'
    )).filter(el => !el.disabled);
  }

  modal.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      const focusables = getFocusables();
      const first = focusables[0];
      const last  = focusables[focusables.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
      }
    }
  });

  async function handlePin() {
    const val = input.value.trim();
    if (val.length < 4) { errEl.textContent = 'PIN deve ter pelo menos 4 dígitos.'; return; }
    const hash = await sha256(val);
    if (isFirst) {
      localStorage.setItem('guaru-pin-hash', hash);
      modal.remove();
    } else {
      if (hash === stored) {
        modal.remove();
      } else {
        errEl.textContent = 'PIN incorreto. Tente novamente.';
        input.value = '';
        input.focus();
      }
    }
  }

  btn.addEventListener('click', handlePin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handlePin(); });
})();
</script>

        <input type="text" id="lancDescricao" class="form-input" placeholder="Ex: Aluguel, Shopee…" required>
      </div>
      <div class="form-group" id="grupoCategoriaLanc">
        <label class="form-label" for="lancCategoria">Categoria</label>
        <input type="text" id="lancCategoria" class="form-input" placeholder="Ex: Moradia, Marketing…">
      </div>
      <div class="form-group">
        <label class="form-label" for="lancValor">Valor (R$)</label>
        <input type="number" id="lancValor" class="form-input" step="0.01" min="0" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label class="form-label" id="labelVencLanc" for="lancVencimento">Vencimento</label>
        <input type="date" id="lancVencimento" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label" for="lancStatus">Status</label>
        <select id="lancStatus" class="filter-select form-input">
          <option value="Pendente">Pendente</option>
          <option value="Pago">Pago</option>
          <option value="Mensal">Mensal</option>
          <option value="Atrasado">Atrasado</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px">
        <button type="button" class="action-pill"
          style="flex:1;justify-content:center"
          onclick="document.getElementById('sheetOverlay').style.display='none'">Cancelar</button>
        <button type="submit" class="action-pill primary"
          style="flex:2;justify-content:center">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="erp-data.js" onerror="window.ERP_EMBEDDED=null;console.log('erp-data.js não encontrado — aguardando carga manual.')"></script>
<script src="xlsx.full.min.js"></script>
<script src="chart.umd.min.js"></script>
<script src="guaru-motion.js" defer onerror="console.log('guaru-motion.js opcional não encontrado.')"></script>
<script src="guaru-sparkline.js" defer onerror="console.log('guaru-sparkline.js opcional não encontrado.')"></script>
<script src="app.js"></script>

<script>
(function () {
  /* --- Tema (preserva preferência salva; dark é o default do HTML) --- */
  (function initTheme() {
    var saved = localStorage.getItem('guaru-theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    }
    var btn = document.getElementById('themeToggle');
    if (btn) {
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('guaru-theme', next);
      });
    }
  })();

  /* --- Data no greeting --- */
  var greetingDate = document.getElementById('greetingDate');
  if (greetingDate) {
    greetingDate.textContent = new Date().toLocaleDateString('pt-BR', {
      weekday: 'long', day: 'numeric', month: 'long'
    });
  }

  /* --- Search toggle (mobile expand) --- */
  var searchToggle = document.getElementById('searchToggle');
  var searchBox    = document.getElementById('searchBox');
  if (searchToggle && searchBox) {
    searchToggle.addEventListener('click', function () {
      var isOpen = searchBox.classList.toggle('open');
      if (isOpen) {
        searchBox.focus();
        searchToggle.setAttribute('aria-label', 'Fechar busca');
        searchToggle.setAttribute('aria-expanded', 'true');
      } else {
        searchBox.value = '';
        searchToggle.setAttribute('aria-label', 'Buscar');
        searchToggle.setAttribute('aria-expanded', 'false');
        // dispara re-render se app.js expôs renderView/render
        if (typeof window.render === 'function') window.render();
      }
    });
    // ESC fecha busca
    searchBox.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        searchBox.classList.remove('open');
        searchBox.value = '';
        searchToggle.setAttribute('aria-label', 'Buscar');
        searchToggle.setAttribute('aria-expanded', 'false');
        searchToggle.focus();
        if (typeof window.render === 'function') window.render();
      }
    });
  }

  /* --- Badge de vencimento no bottom nav --- */
  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () {
      var badge = document.getElementById('bnavBadge');
      var alertBanner = document.querySelector('.alert-banner');
      if (alertBanner && badge) {
        badge.textContent = '!';
        badge.style.display = 'flex';
      }
    }, 2000);
  });

  /* --- Utilitário: focus trap genérico --- */
  function makeFocusTrap(containerEl, triggerEl) {
    function getFocusables() {
      return Array.from(containerEl.querySelectorAll(
        'a[href], button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
      ));
    }
    function trapKeydown(e) {
      if (e.key !== 'Tab') return;
      var focusables = getFocusables();
      if (focusables.length === 0) { e.preventDefault(); return; }
      var first = focusables[0];
      var last  = focusables[focusables.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
      }
    }
    return {
      activate: function () {
        containerEl.addEventListener('keydown', trapKeydown);
        var focusables = getFocusables();
        if (focusables.length > 0) focusables[0].focus();
      },
      deactivate: function () {
        containerEl.removeEventListener('keydown', trapKeydown);
        if (triggerEl) triggerEl.focus();
      }
    };
  }

  /* --- FAB → action sheet --- */
  var fab = document.getElementById('fabAdd');
  var sheetOverlay = document.getElementById('sheetOverlay');
  var sheetTrap = sheetOverlay ? makeFocusTrap(sheetOverlay, fab) : null;
  if (fab && sheetOverlay) {
    fab.addEventListener('click', function () {
      sheetOverlay.style.display = 'flex';
      if (sheetTrap) sheetTrap.activate();
    });
  }
  if (sheetOverlay) {
    sheetOverlay.addEventListener('click', function (e) {
      if (e.target === sheetOverlay) {
        sheetOverlay.style.display = 'none';
        if (sheetTrap) sheetTrap.deactivate();
      }
    });
    // ESC fecha sheet
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && sheetOverlay.style.display === 'flex') {
        sheetOverlay.style.display = 'none';
        if (sheetTrap) sheetTrap.deactivate();
      }
    });
  }

  /* --- Drawer "Mais" --- */
  var bnavMore      = document.getElementById('bnavMore');
  var drawerOverlay = document.getElementById('drawerOverlay');
  var drawer        = document.getElementById('drawer');
  var drawerTrap    = drawerOverlay ? makeFocusTrap(drawerOverlay, bnavMore) : null;

  function openDrawer() {
    if (!drawerOverlay || !drawer) return;
    drawerOverlay.style.display = 'flex';
    // micro delay para CSS transition funcionar
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        drawer.classList.add('open');
        if (drawerTrap) drawerTrap.activate();
      });
    });
    if (bnavMore) bnavMore.setAttribute('aria-expanded', 'true');
  }

  function closeDrawer() {
    if (!drawer || !drawerOverlay) return;
    drawer.classList.remove('open');
    drawer.addEventListener('transitionend', function hide() {
      drawerOverlay.style.display = 'none';
      drawer.removeEventListener('transitionend', hide);
    });
    if (drawerTrap) drawerTrap.deactivate();
    if (bnavMore) bnavMore.setAttribute('aria-expanded', 'false');
  }

  if (bnavMore) bnavMore.addEventListener('click', openDrawer);

  if (drawerOverlay) {
    drawerOverlay.addEventListener('click', function (e) {
      if (e.target === drawerOverlay) closeDrawer();
    });
  }

  // Fechar drawer ao clicar em item e marcar aba ativa no bottom nav
  if (drawer) {
    drawer.querySelectorAll('.navitem').forEach(function (item) {
      item.addEventListener('click', function () {
        closeDrawer();
        // Sincronizar estado ativo no bottom nav
        document.querySelectorAll('.bottom-nav .bnav-item').forEach(function (b) {
          b.classList.remove('active');
          b.removeAttribute('aria-current');
        });
      });
    });
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && drawerOverlay && drawerOverlay.style.display === 'flex') {
      closeDrawer();
    }
  });

  /* --- Sincronizar estado ativo no bottom nav quando app.js ativa navitem --- */
  // app.js usa querySelectorAll('.navitem') e altera .active
  // Observar mudanças de classe nos navitems do bottom-nav para refletir aria-current
  var bnavItems = document.querySelectorAll('.bottom-nav .bnav-item');
  if (bnavItems.length > 0) {
    var observer = new MutationObserver(function () {
      bnavItems.forEach(function (item) {
        if (item.classList.contains('active')) {
          item.setAttribute('aria-current', 'page');
        } else {
          item.removeAttribute('aria-current');
        }
      });
    });
    bnavItems.forEach(function (item) {
      observer.observe(item, { attributes: true, attributeFilter: ['class'] });
    });
  }

})();
</script>

</body>
